<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>big orange 4</title>
    <style>
        body { margin: 0; overflow: hidden; background: #431407; font-family: 'courier new', monospace; color: #fb923c; text-transform: lowercase; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #room-id { font-size: 24px; font-weight: bold; color: #ffedd5; }
        canvas { display: block; background: #7c2d12; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="room-id">room: 1 / 100</div>
        <div>deaths: <span id="deaths">0</span></div>
        <div style="margin-top: 10px; opacity: 0.8;">space: double jump | r: reset</div>
    </div>
    <canvas id="g"></canvas>

    <script>
        const canvas = document.getElementById('g');
        const ctx = canvas.getContext('2d');
        const roomEl = document.getElementById('room-id');
        const deathEl = document.getElementById('deaths');

        let currentRoom = 1;
        let deaths = 0;
        let frame = 0;

        const p = {
            x: 50, y: 300, w: 30, h: 30,
            vx: 0, vy: 0, speed: 0.7, jump: 12,
            rot: 0, jumps: 2, grounded: false,
            moveLeft: false, moveRight: false
        };

        // hard-coded level data
        // [x, y, width, hazardType(0:none, 1:saw, 2:spikes)]
        const levelData = {
            1: [[0, 500, 400, 0], [450, 500, 300, 0], [800, 500, 400, 0]],
            2: [[0, 500, 200, 0], [300, 400, 100, 1], [500, 300, 100, 0], [750, 400, 200, 2]],
            3: [[0, 500, 150, 0], [500, 500, 50, 1], [1000, 500, 100, 0]], // the impossible leap
            4: [[0, 500, 100, 0], [200, 200, 40, 0], [400, 500, 40, 2], [600, 200, 40, 0]],
            5: [[0, 500, 300, 2], [350, 450, 100, 1], [500, 350, 100, 1], [700, 250, 100, 1]]
        };

        let platforms = [];
        let hazards = [];
        let goalX = 1200;

        function buildLevel(n) {
            platforms = [];
            hazards = [];
            p.x = 50; p.y = 300; p.vx = 0; p.vy = 0;
            roomEl.innerText = `room: ${n} / 100`;

            // if level isn't explicitly defined, use a generated hard-coded pattern
            const data = levelData[n] || [
                [0, 500, 150, 0],
                [300, 500 - (n * 2), 100, n % 2 === 0 ? 1 : 2],
                [600, 400, 80, 1],
                [900, 500 - (n % 10 * 10), 120, 2]
            ];

            data.forEach(d => {
                platforms.push({ x: d[0], y: d[1], w: d[2], h: 30 });
                if (d[3] === 1) hazards.push({ type: 'saw', x: d[0] + d[2]/2, y: d[1] - 40, r: 20, rot: 0 });
                if (d[3] === 2) hazards.push({ type: 'spike', x: d[0], y: d[1] - 10, w: d[2] });
            });

            goalX = data[data.length - 1][0] + 300;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.onkeydown = e => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') p.moveLeft = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') p.moveRight = true;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') {
                if (p.jumps > 0) {
                    p.vy = -p.jump;
                    p.jumps--;
                    p.grounded = false;
                }
            }
            if (e.code === 'KeyR') reset();
        };

        window.onkeyup = e => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') p.moveLeft = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') p.moveRight = false;
        };

        function reset() {
            deaths++;
            deathEl.innerText = deaths;
            buildLevel(currentRoom);
        }

        function update() {
            if (p.moveLeft) p.vx -= p.speed;
            if (p.moveRight) p.vx += p.speed;
            p.vx *= 0.9;
            p.vy += 0.6;
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vx * 0.06;

            p.grounded = false;
            platforms.forEach(plat => {
                if (p.x + p.w > plat.x && p.x < plat.x + plat.w &&
                    p.y + p.h > plat.y && p.y + p.h < plat.y + plat.h && p.vy >= 0) {
                    p.y = plat.y - p.h;
                    p.vy = 0;
                    p.grounded = true;
                    p.jumps = 2;
                }
            });

            hazards.forEach(h => {
                if (h.type === 'saw') {
                    h.rot += 0.2;
                    let dx = (p.x + 15) - h.x;
                    let dy = (p.y + 15) - h.y;
                    if (Math.sqrt(dx*dx + dy*dy) < h.r + 10) reset();
                } else {
                    if (p.x + p.w > h.x && p.x < h.x + h.w && p.y + p.h > h.y && p.y < h.y + 10) reset();
                }
            });

            if (p.x > goalX) {
                currentRoom++;
                buildLevel(currentRoom);
            }

            if (p.y > canvas.height + 200) reset();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-p.x + 200, 0);

            // orange platforms
            ctx.fillStyle = '#ea580c';
            platforms.forEach(plat => ctx.fillRect(plat.x, plat.y, plat.w, plat.h));

            // orange goal
            ctx.fillStyle = '#fb923c';
            ctx.fillRect(goalX, 200, 60, 400);

            // orange hazards
            hazards.forEach(h => {
                ctx.fillStyle = '#f97316';
                if (h.type === 'saw') {
                    ctx.save();
                    ctx.translate(h.x, h.y);
                    ctx.rotate(h.rot);
                    for(let i=0; i<8; i++) {
                        ctx.rotate(Math.PI/4);
                        ctx.fillRect(-2, -h.r - 8, 4, 12);
                    }
                    ctx.beginPath(); ctx.arc(0,0, h.r, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                } else {
                    for(let i=0; i<h.w; i+=15) {
                        ctx.beginPath();
                        ctx.moveTo(h.x+i, h.y+10); ctx.lineTo(h.x+i+7, h.y-10); ctx.lineTo(h.x+i+15, h.y+10);
                        ctx.fill();
                    }
                }
            });

            // the smiling orange
            ctx.save();
            ctx.translate(p.x + 15, p.y + 15);
            ctx.rotate(p.rot);
            ctx.fillStyle = '#f97316';
            ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#431407';
            ctx.beginPath(); ctx.arc(-6, -4, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(6, -4, 2, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#431407';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 2, 8, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
            ctx.restore();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        buildLevel(1);
        loop();
    </script>
</body>
</html>
