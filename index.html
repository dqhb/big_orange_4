<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>big orange 4</title>
    <style>
        body { margin: 0; overflow: hidden; background: #7c2d12; font-family: 'courier new', monospace; color: #fdba74; text-transform: lowercase; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        canvas { display: block; background: #9a3412; }
        .death-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffedd5; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="room-title">room: 1/100</div>
        <div>deaths: <span id="death-count">0</span></div>
        <div style="margin-top:5px; opacity:0.8;">space to double jump | r to restart room</div>
    </div>
    <div id="flash" class="death-flash"></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const roomText = document.getElementById('room-title');
        const deathText = document.getElementById('death-count');
        const flash = document.getElementById('flash');

        let currentRoom = 1;
        let deaths = 0;
        let frame = 0;

        const p = {
            x: 50, y: 300, w: 30, h: 30, 
            vx: 0, vy: 0, speed: 0.7, jump: 11,
            rot: 0, grounded: false, jumpsLeft: 2
        };

        let platforms = [];
        let hazards = [];
        let goal = { x: 0, y: 0, w: 50, h: 100 };

        function initRoom(num) {
            platforms = [];
            hazards = [];
            p.x = 50; p.y = 300; p.vx = 0; p.vy = 0;
            roomText.innerText = `room: ${num}/100`;

            // starting block
            platforms.push({ x: 0, y: 500, w: 150, h: 400 });

            // chaotic generation
            for (let i = 0; i < 8; i++) {
                let rx = 200 + (i * 220);
                // "impossible" logic: some heights are way too high, some are ground level
                let ry = 150 + (Math.random() * 500); 
                let rw = 40 + (Math.random() * 150);

                platforms.push({ x: rx, y: ry, w: rw, h: 20 });

                // random orange hazards
                if (Math.random() > 0.4) {
                    hazards.push({ 
                        x: rx + rw/2, 
                        y: ry - 30, 
                        r: 15 + Math.random() * 20, 
                        type: 'saw', 
                        rot: 0 
                    });
                }
                if (Math.random() > 0.7) {
                    hazards.push({ x: rx, y: ry - 10, w: rw, type: 'spikes' });
                }
            }

            goal = { x: 2000, y: 200 + Math.random() * 400, w: 60, h: 120 };
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        const keys = {};
        window.onkeydown = e => {
            keys[e.code] = true;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                if (p.jumpsLeft > 0) {
                    p.vy = -p.jump;
                    p.jumpsLeft--;
                    p.grounded = false;
                }
            }
            if (e.code === 'KeyR') die();
        };
        window.onkeyup = e => keys[e.code] = false;

        function die() {
            deaths++;
            deathText.innerText = deaths;
            flash.style.opacity = '0.4';
            setTimeout(() => flash.style.opacity = '0', 50);
            initRoom(currentRoom);
        }

        function update() {
            frame++;
            if (keys['KeyA'] || keys['ArrowLeft']) p.vx -= p.speed;
            if (keys['KeyD'] || keys['ArrowRight']) p.vx += p.speed;
            
            p.vx *= 0.9;
            p.vy += 0.5;
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vx * 0.05;

            p.grounded = false;
            platforms.forEach(plat => {
                if (p.x + p.w > plat.x && p.x < plat.x + plat.w &&
                    p.y + p.h > plat.y && p.y + p.h < plat.y + plat.h && p.vy >= 0) {
                    p.y = plat.y - p.h;
                    p.vy = 0;
                    p.grounded = true;
                    p.jumpsLeft = 2; // reset double jump
                }
            });

            hazards.forEach(h => {
                if (h.type === 'saw') {
                    h.rot += 0.15;
                    if (Math.hypot(p.x + 15 - h.x, p.y + 15 - h.y) < h.r + 12) die();
                }
                if (h.type === 'spikes') {
                    if (p.x + p.w > h.x && p.x < h.x + h.w && p.y + p.h > h.y && p.y < h.y + 10) die();
                }
            });

            if (p.x > goal.x) {
                currentRoom++;
                initRoom(currentRoom);
            }

            if (p.y > canvas.height + 100) die();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(-p.x + canvas.width/4, 0);

            // orange platforms
            ctx.fillStyle = '#ea580c';
            platforms.forEach(plat => {
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            });

            // orange goal
            ctx.fillStyle = '#fb923c';
            ctx.fillRect(goal.x, goal.y, goal.w, goal.h);

            // orange hazards
            hazards.forEach(h => {
                ctx.fillStyle = '#f97316';
                if (h.type === 'saw') {
                    ctx.save();
                    ctx.translate(h.x, h.y);
                    ctx.rotate(h.rot);
                    for(let i=0; i<10; i++) {
                        ctx.rotate(Math.PI/5);
                        ctx.fillRect(0, -h.r-8, 4, 12);
                    }
                    ctx.beginPath(); ctx.arc(0,0, h.r, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                }
                if (h.type === 'spikes') {
                    for(let i=0; i<h.w; i+=12) {
                        ctx.beginPath();
                        ctx.moveTo(h.x + i, h.y + 10);
                        ctx.lineTo(h.x + i + 6, h.y - 5);
                        ctx.lineTo(h.x + i + 12, h.y + 10);
                        ctx.fill();
                    }
                }
            });

            // the orange with a smile
            ctx.save();
            ctx.translate(p.x + 15, p.y + 15);
            ctx.rotate(p.rot);
            ctx.fillStyle = '#f97316';
            ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
            // eyes
            ctx.fillStyle = '#451a03';
            ctx.beginPath(); ctx.arc(-5, -4, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(5, -4, 2, 0, Math.PI*2); ctx.fill();
            // smile
            ctx.beginPath();
            ctx.arc(0, 2, 7, 0.2 * Math.PI, 0.8 * Math.PI);
            ctx.stroke();
            ctx.restore();

            ctx.restore();
        }

            // check if room is "impossible" and display warning if needed
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        initRoom(1);
        loop();
    </script>
</body>
</html>
