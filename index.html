<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>big orange 4</title>
    <style>
        body { margin: 0; overflow: hidden; background: #431407; font-family: 'courier new', monospace; color: #fb923c; text-transform: lowercase; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(67, 20, 7, 0.9); padding: 10px; border: 2px solid #ea580c; border-radius: 5px; }
        #mode-indicator { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; display: block; }
        .btn { background: #ea580c; color: white; border: none; padding: 5px 10px; cursor: pointer; margin: 2px; border-radius: 3px; }
        .btn:hover { background: #fb923c; }
        .btn.active { background: #fde047; color: #431407; }
        canvas { display: block; background: #7c2d12; cursor: crosshair; }
        #controls { font-size: 0.8rem; margin-top: 10px; color: #ffedd5; }
    </style>
</head>
<body>
    <div id="ui">
        <span id="mode-indicator">mode: editing</span>
        <button class="btn" onclick="setTool('block')">block</button>
        <button class="btn" onclick="setTool('moving')">moving plat</button>
        <button class="btn" onclick="setTool('saw')">saw</button>
        <button class="btn" onclick="setTool('spike')">spike</button>
        <button class="btn" onclick="setTool('goal')">set goal</button>
        <hr style="border:1px solid #ea580c">
        <button class="btn" onclick="togglePlay()">play / edit</button>
        <button class="btn" onclick="saveLevel()">save</button>
        <button class="btn" onclick="clearLevel()">clear</button>
        <div id="controls">
            click to place | r: reset player | arrows: move camera
        </div>
    </div>
    <canvas id="g"></canvas>

    <script>
        const canvas = document.getElementById('g');
        const ctx = canvas.getContext('2d');
        const modeIndicator = document.getElementById('mode-indicator');

        let isPlaying = false;
        let tool = 'block';
        let camX = 0;
        let frame = 0;

        let level = JSON.parse(localStorage.getItem('bo4_custom_level')) || {
            platforms: [{x: 0, y: 500, w: 200, h: 40, type: 'block'}],
            hazards: [],
            goal: {x: 800, y: 300}
        };

        const p = {
            x: 50, y: 300, w: 30, h: 30, vx: 0, vy: 0, 
            speed: 0.75, jump: 12.5, rot: 0, jumps: 2, grounded: false
        };

        const keys = {};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function setTool(t) { tool = t; }

        function togglePlay() {
            isPlaying = !isPlaying;
            modeIndicator.innerText = isPlaying ? "mode: playing" : "mode: editing";
            if (isPlaying) { p.x = 50; p.y = 300; p.vx = 0; p.vy = 0; }
        }

        function saveLevel() {
            localStorage.setItem('bo4_custom_level', JSON.stringify(level));
            alert("level saved to localstorage!");
        }

        function clearLevel() {
            if(confirm("clear everything?")) {
                level = { platforms: [{x: 0, y: 500, w: 200, h: 40, type: 'block'}], hazards: [], goal: {x: 800, y: 300} };
                saveLevel();
            }
        }

        canvas.addEventListener('mousedown', e => {
            if (isPlaying) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left + camX;
            const y = e.clientY - rect.top;

            if (tool === 'block' || tool === 'moving') {
                level.platforms.push({ x, y, w: 120, h: 30, type: tool, originX: x });
            } else if (tool === 'saw') {
                level.hazards.push({ type: 'saw', x, y, r: 20, rot: 0 });
            } else if (tool === 'spike') {
                level.hazards.push({ type: 'spike', x, y, w: 100, rogue: Math.floor(Math.random() * 6) });
            } else if (tool === 'goal') {
                level.goal = { x, y };
            }
        });

        function update() {
            frame++;
            if (!isPlaying) {
                if (keys['ArrowRight']) camX += 10;
                if (keys['ArrowLeft']) camX -= 10;
                return;
            }

            // player movement
            if (keys['KeyA'] || keys['ArrowLeft']) p.vx -= p.speed;
            if (keys['KeyD'] || keys['ArrowRight']) p.vx += p.speed;
            if (keys['Space'] || keys['KeyW'] || keys['ArrowUp']) {
                if (p.jumps > 0 && !keys.jumpPressed) {
                    p.vy = -p.jump; p.jumps--; p.grounded = false;
                    keys.jumpPressed = true;
                }
            } else { keys.jumpPressed = false; }
            if (keys['KeyR']) { p.x = 50; p.y = 300; p.vx = 0; p.vy = 0; }

            p.vx *= 0.88; p.vy += 0.6;
            p.x += p.vx; p.y += p.vy;
            p.rot += p.vx * 0.06;
            camX = p.x - 200;

            p.grounded = false;
            level.platforms.forEach(plat => {
                if (plat.type === 'moving') plat.x = plat.originX + Math.sin(frame * 0.03) * 100;
                if (p.x + p.w > plat.x && p.x < plat.x + plat.w &&
                    p.y + p.h > plat.y && p.y + p.h < plat.y + plat.h && p.vy >= 0) {
                    p.y = plat.y - p.h; p.vy = 0; p.grounded = true; p.jumps = 2;
                }
            });

            level.hazards.forEach(h => {
                if (h.type === 'saw') {
                    h.rot += 0.2;
                    if (Math.hypot(p.x + 15 - h.x, p.y + 15 - h.y) < h.r + 10) { p.x = 50; p.y = 300; }
                } else {
                    for (let i = 0; i < h.w; i += 15) {
                        let isRogue = (i / 15) === h.rogue;
                        if (p.x + p.w > h.x + i && p.x < h.x + i + 15 && 
                            p.y + p.h > h.y - (isRogue ? 15 : 0) && p.y < h.y + 10) { p.x = 50; p.y = 300; }
                    }
                }
            });

            if (p.y > canvas.height + 200) { p.x = 50; p.y = 300; }
        }

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.save();
            ctx.translate(-camX, 0);

            // platforms
            level.platforms.forEach(plat => {
                ctx.fillStyle = plat.type === 'moving' ? '#fb923c' : '#ea580c';
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            });

            // hazards
            level.hazards.forEach(h => {
                ctx.fillStyle = '#f97316';
                if (h.type === 'saw') {
                    ctx.save(); ctx.translate(h.x, h.y); ctx.rotate(h.rot);
                    for(let i=0; i<8; i++) { ctx.rotate(Math.PI/4); ctx.fillRect(-2, -h.r - 8, 4, 12); }
                    ctx.beginPath(); ctx.arc(0,0, h.r, 0, Math.PI*2); ctx.fill(); ctx.restore();
                } else {
                    for(let i=0; i<h.w; i+=15) {
                        let isRogue = (i / 15) === h.rogue;
                        ctx.beginPath(); ctx.moveTo(h.x+i, h.y+10); 
                        ctx.lineTo(h.x+i+7, h.y-(isRogue ? 20 : 10)); 
                        ctx.lineTo(h.x+i+15, h.y+10); ctx.fill();
                    }
                }
            });

            // goal
            ctx.fillStyle = '#fbbf24';
            ctx.fillRect(level.goal.x, level.goal.y, 60, 100);

            // player
            if (isPlaying) {
                ctx.save();
                ctx.translate(p.x + 15, p.y + 15); ctx.rotate(p.rot);
                ctx.fillStyle = '#f97316';
                ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#431407';
                ctx.beginPath(); ctx.arc(-6, -4, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(6, -4, 2, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#431407'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 2, 8, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
                ctx.restore();
            }

            ctx.restore();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
