<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>big orange 4</title>
    <style>
        body { margin: 0; overflow: hidden; background: #431407; font-family: 'courier new', monospace; color: #fb923c; text-transform: lowercase; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #room-id { font-size: 24px; font-weight: bold; color: #ffedd5; }
        canvas { display: block; background: #7c2d12; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="room-id">room: 1 / 100</div>
        <div>deaths: <span id="deaths">0</span></div>
        <div style="margin-top: 10px; opacity: 0.8;">space: double jump | r: reset</div>
    </div>
    <canvas id="g"></canvas>

    <script>
        const canvas = document.getElementById('g');
        const ctx = canvas.getContext('2d');
        const roomEl = document.getElementById('room-id');
        const deathEl = document.getElementById('deaths');

        let currentRoom = 1;
        let deaths = 0;
        let frame = 0;

        const p = {
            x: 50, y: 300, w: 30, h: 30,
            vx: 0, vy: 0, speed: 0.7, jump: 11.5,
            rot: 0, jumps: 2, grounded: false,
            moveLeft: false, moveRight: false
        };

        let platforms = [];
        let hazards = [];
        let goalX = 2000;

        // the 100-level architect
        function buildLevel(n) {
            platforms = [];
            hazards = [];
            p.x = 60; p.y = 300; p.vx = 0; p.vy = 0;
            roomEl.innerText = `room: ${n} / 100`;

            // fixed starting floor
            platforms.push({ x: 0, y: 500, w: 160, h: 400 });

            // deterministic design for all 100 rooms
            // uses n to shift coordinates so every level is "pre-made" and different
            for (let i = 1; i <= 6; i++) {
                let x = i * (220 + (n % 5 * 10)); // varying gaps
                let y = 450 - (Math.sin(n * i) * 100) - (i * 20); 
                let w = 70 + (n % 3 * 20);
                
                // ensure it's not "impossible" - cap the height and gaps
                y = Math.max(150, Math.min(y, 550));
                
                platforms.push({ x, y, w, h: 30 });

                // hazard placement
                if ((n + i) % 4 === 0) {
                    hazards.push({ type: 'saw', x: x + w/2, y: y - 45, r: 18, rot: 0 });
                } else if ((n + i) % 3 === 0) {
                    // rogue spike logic: random index in the row is taller
                    let rogueIdx = Math.floor((n * i) % (w / 15));
                    hazards.push({ type: 'spike', x: x, y: y - 10, w: w, rogue: rogueIdx });
                }
            }

            goalX = 1700;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.onkeydown = e => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') p.moveLeft = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') p.moveRight = true;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') {
                if (p.jumps > 0) {
                    p.vy = -p.jump;
                    p.jumps--;
                    p.grounded = false;
                }
            }
            if (e.code === 'KeyR') reset();
        };

        window.onkeyup = e => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') p.moveLeft = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') p.moveRight = false;
        };

        function reset() {
            deaths++;
            deathEl.innerText = deaths;
            buildLevel(currentRoom);
        }

        function update() {
            if (p.moveLeft) p.vx -= p.speed;
            if (p.moveRight) p.vx += p.speed;
            p.vx *= 0.9;
            p.vy += 0.55;
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vx * 0.06;

            p.grounded = false;
            platforms.forEach(plat => {
                if (p.x + p.w > plat.x && p.x < plat.x + plat.w &&
                    p.y + p.h > plat.y && p.y + p.h < plat.y + plat.h && p.vy >= 0) {
                    p.y = plat.y - p.h;
                    p.vy = 0;
                    p.grounded = true;
                    p.jumps = 2;
                }
            });

            hazards.forEach(h => {
                if (h.type === 'saw') {
                    h.rot += 0.2;
                    let dx = (p.x + 15) - h.x;
                    let dy = (p.y + 15) - h.y;
                    if (Math.sqrt(dx*dx + dy*dy) < h.r + 10) reset();
                } else {
                    // spike collision (including rogue tall spike)
                    for (let i = 0; i < h.w; i += 15) {
                        let isRogue = (i / 15) === h.rogue;
                        let sH = isRogue ? 25 : 12;
                        if (p.x + p.w > h.x + i && p.x < h.x + i + 15 && 
                            p.y + p.h > h.y - (isRogue ? 15 : 0) && p.y < h.y + 10) reset();
                    }
                }
            });

            if (p.x > goalX) {
                currentRoom = (currentRoom % 100) + 1;
                buildLevel(currentRoom);
            }

            if (p.y > canvas.height + 200) reset();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-p.x + 200, 0);

            // platforms
            ctx.fillStyle = '#ea580c';
            platforms.forEach(plat => ctx.fillRect(plat.x, plat.y, plat.w, plat.h));

            // goal
            ctx.fillStyle = '#fb923c';
            ctx.fillRect(goalX, 100, 60, 500);

            // hazards
            hazards.forEach(h => {
                ctx.fillStyle = '#f97316';
                if (h.type === 'saw') {
                    ctx.save();
                    ctx.translate(h.x, h.y);
                    ctx.rotate(h.rot);
                    for(let i=0; i<8; i++) {
                        ctx.rotate(Math.PI/4);
                        ctx.fillRect(-2, -h.r - 8, 4, 12);
                    }
                    ctx.beginPath(); ctx.arc(0,0, h.r, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                } else {
                    for(let i=0; i<h.w; i+=15) {
                        let isRogue = (i / 15) === h.rogue;
                        ctx.beginPath();
                        ctx.moveTo(h.x+i, h.y+10); 
                        ctx.lineTo(h.x+i+7, h.y-(isRogue ? 20 : 10)); 
                        ctx.lineTo(h.x+i+15, h.y+10);
                        ctx.fill();
                    }
                }
            });

            // smiling orange
            ctx.save();
            ctx.translate(p.x + 15, p.y + 15);
            ctx.rotate(p.rot);
            ctx.fillStyle = '#f97316';
            ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#431407';
            ctx.beginPath(); ctx.arc(-6, -4, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(6, -4, 2, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#431407';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 2, 8, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
            ctx.restore();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        buildLevel(1);
        loop();
    </script>
</body>
</html>
