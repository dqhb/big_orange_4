<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>big orange 4</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'courier new', monospace; color: #ffedd5; text-transform: lowercase; user-select: none; }
        #app-container { position: relative; width: 100vw; height: 100vh; background: #431407; display: flex; justify-content: center; align-items: center; }

        #home-screen, #editor-screen {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #f97316; /* Orange home screen */
            transition: opacity 0.5s;
        }
        #editor-screen { background: #7c2d12; justify-content: flex-start; align-items: flex-start; opacity: 0; pointer-events: none; }
        #home-screen.hidden, #editor-screen.hidden { opacity: 0; pointer-events: none; }
        #editor-screen.active { opacity: 1; pointer-events: auto; }

        h1 { font-size: 4rem; margin-bottom: 0; color: #431407; }
        h2 { font-size: 1.5rem; margin-top: 5px; color: #ea580c; }

        .menu-btn { background: #ea580c; color: white; border: none; padding: 15px 30px; margin: 10px; font-size: 1.5rem; cursor: pointer; border-radius: 8px; transition: background 0.3s; }
        .menu-btn:hover { background: #fb923c; }

        #level-list-container { max-height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; margin-top: 20px; width: 80%; max-width: 600px; }
        .level-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .level-item span { flex-grow: 1; margin-right: 10px; color: #ffedd5; }
        .level-item button { margin-left: 5px; padding: 5px 10px; font-size: 0.9rem; background: #fb923c; border: none; border-radius: 3px; cursor: pointer; }
        .level-item button:hover { background: #fde047; }
        .level-item .delete-btn { background: #ef4444; }
        .level-item .delete-btn:hover { background: #dc2626; }

        #editor-ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(67, 20, 7, 0.9); padding: 10px; border: 2px solid #ea580c; border-radius: 5px; }
        #mode-indicator { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; display: block; color: #ffedd5; }
        .tool-btn { background: #ea580c; color: white; border: none; padding: 5px 10px; cursor: pointer; margin: 2px; border-radius: 3px; font-size: 0.8rem; }
        .tool-btn:hover { background: #fb923c; }
        .tool-btn.active { background: #fde047; color: #431407; }
        #editor-controls { font-size: 0.7rem; margin-top: 8px; color: #ffedd5; opacity: 0.8; }
        #editor-canvas { display: block; background: #7c2d12; cursor: crosshair; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="home-screen">
            <h1>big orange 4</h1>
            <h2>by eric</h2>
            <button class="menu-btn" onclick="startNewLevel()">new game</button>
            <button class="menu-btn" onclick="openLevelSelection()">open game</button>
            <div id="level-list-container" class="hidden"></div>
        </div>

        <div id="editor-screen" class="hidden">
            <div id="editor-ui">
                <span id="mode-indicator">mode: editing</span>
                <button class="tool-btn" data-tool="block" onclick="setTool('block')">block (1x1)</button>
                <button class="tool-btn" data-tool="moving" onclick="setTool('moving')">moving (drag)</button>
                <button class="tool-btn" data-tool="saw" onclick="setTool('saw')">saw (9x9)</button>
                <button class="tool-btn" data-tool="spike" onclick="setTool('spike')">spike (1x1)</button>
                <button class="tool-btn" data-tool="start" onclick="setTool('start')">start (1x1)</button>
                <button class="tool-btn" data-tool="goal" onclick="setTool('goal')">goal (1x1)</button>
                <hr style="border:1px solid #ea580c; margin: 8px 0;">
                <button class="tool-btn" onclick="togglePlay()">play / edit</button>
                <button class="tool-btn" onclick="saveCurrentLevel()">save level</button>
                <button class="tool-btn" onclick="loadLevel(currentLevelId)">load selected</button>
                <button class="tool-btn" onclick="showHomeScreen()">back to menu</button>
                <div id="editor-controls">
                    click/drag to place | r: reset player | arrows: move camera | delete: remove
                </div>
            </div>
            <canvas id="editor-canvas"></canvas>
        </div>
    </div>

    <script>
        const GRID_SIZE = 40;
        const SAW_SIZE = 9 * GRID_SIZE; // 9x9 grid units

        const appContainer = document.getElementById('app-container');
        const homeScreen = document.getElementById('home-screen');
        const editorScreen = document.getElementById('editor-screen');
        const levelListContainer = document.getElementById('level-list-container');
        const editorCanvas = document.getElementById('editor-canvas');
        const editorCtx = editorCanvas.getContext('2d');
        const modeIndicator = document.getElementById('mode-indicator');
        
        let isPlaying = false;
        let currentTool = 'block';
        let camX = 0;
        let frame = 0;
        let currentLevelId = null; // ID of the level being edited/played
        let levels = {}; // Stores all levels from local storage

        let levelData = {
            platforms: [], hazards: [], goals: [], start: {x: 1 * GRID_SIZE, y: 12 * GRID_SIZE}
        };

        const player = {
            x: 0, y: 0, w: GRID_SIZE, h: GRID_SIZE, vx: 0, vy: 0, 
            speed: 0.75, jump: 12.5, rot: 0, jumps: 2, grounded: false,
            moveLeft: false, moveRight: false, jumpPressed: false // Prevent continuous jump
        };

        let dragStart = null; // For drawing moving platforms

        const keys = {};
        window.onkeydown = e => { 
            keys[e.code] = true; 
            if (isPlaying && e.code === 'KeyR') { resetPlayer(); }
            if (!isPlaying && e.code === 'Delete') { deleteSelectedObject(); }
        };
        window.onkeyup = e => { keys[e.code] = false; };

        // --- Home Screen Logic ---
        function showHomeScreen() {
            homeScreen.classList.remove('hidden');
            editorScreen.classList.add('hidden');
            loadAllLevels();
        }

        function openLevelSelection() {
            levelListContainer.classList.toggle('hidden');
            loadAllLevels();
        }

        function loadAllLevels() {
            const storedLevels = localStorage.getItem('bo4_levels');
            levels = storedLevels ? JSON.parse(storedLevels) : {};

            levelListContainer.innerHTML = '';
            if (Object.keys(levels).length === 0) {
                levelListContainer.innerHTML = '<div style="text-align:center; padding:10px;">no saved levels yet.</div>';
                return;
            }

            for (const id in levels) {
                const item = document.createElement('div');
                item.className = 'level-item';
                item.innerHTML = `
                    <span>level: ${id}</span>
                    <div>
                        <button onclick="loadLevel('${id}')">edit</button>
                        <button onclick="playLevel('${id}')">play</button>
                        <button class="delete-btn" onclick="deleteLevel('${id}')">delete</button>
                    </div>
                `;
                levelListContainer.appendChild(item);
            }
        }

        function generateUniqueLevelId() {
            let id;
            do {
                id = Math.random().toString(36).substring(2, 7); // short random string
            } while (levels[id]);
            return id;
        }

        function startNewLevel() {
            currentLevelId = generateUniqueLevelId();
            levelData = { platforms: [], hazards: [], goals: [], start: {x: 1 * GRID_SIZE, y: 12 * GRID_SIZE} };
            levelData.platforms.push({ x: 0 * GRID_SIZE, y: 14 * GRID_SIZE, w: 5 * GRID_SIZE, h: 1 * GRID_SIZE, type: 'block' }); // starting platform
            levels[currentLevelId] = levelData; // Add new level to collection
            saveLevelsToLocalStorage();
            showEditor(currentLevelId);
        }

        function loadLevel(id) {
            currentLevelId = id;
            levelData = JSON.parse(JSON.stringify(levels[id])); // Deep copy
            player.x = levelData.start.x; player.y = levelData.start.y;
            showEditor(currentLevelId);
        }

        function playLevel(id) {
            loadLevel(id);
            togglePlay(); // Switch to play mode immediately
        }

        function deleteLevel(id) {
            if (confirm(`are you sure you want to delete level "${id}"?`)) {
                delete levels[id];
                saveLevelsToLocalStorage();
                loadAllLevels(); // Refresh list
            }
        }

        function saveLevelsToLocalStorage() {
            localStorage.setItem('bo4_levels', JSON.stringify(levels));
        }

        // --- Editor Screen Logic ---
        function showEditor(id) {
            homeScreen.classList.add('hidden');
            editorScreen.classList.remove('hidden');
            isPlaying = false;
            modeIndicator.innerText = "mode: editing";
            updateToolButtons();
            resetPlayer(); // Reset player position for current level's start
        }

        function updateToolButtons() {
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tool === currentTool);
            });
        }

        function setTool(t) { 
            currentTool = t; 
            updateToolButtons();
            dragStart = null; // Clear any pending drag for moving platforms
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            modeIndicator.innerText = isPlaying ? "mode: playing" : "mode: editing";
            if (isPlaying) { 
                player.x = levelData.start.x; 
                player.y = levelData.start.y - player.h; // Place on top of start block
                player.vx = 0; player.vy = 0; 
                camX = player.x - editorCanvas.width / 4;
            } else {
                camX = 0; // Reset camera in edit mode
            }
        }

        function saveCurrentLevel() {
            if (currentLevelId) {
                levels[currentLevelId] = JSON.parse(JSON.stringify(levelData)); // Save deep copy
                saveLevelsToLocalStorage();
                alert(`level "${currentLevelId}" saved!`);
            } else {
                alert("no level loaded. start a new one or open existing.");
            }
        }

        editorCanvas.addEventListener('mousedown', e => {
            if (isPlaying) return;
            const rect = editorCanvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left + camX;
            const mouseY = e.clientY - rect.top;
            const gridX = Math.floor(mouseX / GRID_SIZE) * GRID_SIZE;
            const gridY = Math.floor(mouseY / GRID_SIZE) * GRID_SIZE;

            if (currentTool === 'moving') {
                dragStart = { x: gridX, y: gridY };
            } else if (currentTool === 'block') {
                levelData.platforms.push({ x: gridX, y: gridY, w: GRID_SIZE, h: GRID_SIZE, type: 'block' });
            } else if (currentTool === 'saw') {
                // Saws are 9x9, so center on the grid point clicked
                levelData.hazards.push({ type: 'saw', x: gridX + SAW_SIZE/2, y: gridY + SAW_SIZE/2, r: SAW_SIZE/2, rot: 0 });
            } else if (currentTool === 'spike') {
                levelData.hazards.push({ type: 'spike', x: gridX, y: gridY, w: GRID_SIZE, rogue: Math.random() < 0.5 ? 0 : -1 }); // Single spike, maybe rogue
            } else if (currentTool === 'start') {
                levelData.start = { x: gridX, y: gridY };
            } else if (currentTool === 'goal') {
                levelData.goals.push({ x: gridX, y: gridY, w: GRID_SIZE, h: GRID_SIZE });
            }
        });

        editorCanvas.addEventListener('mouseup', e => {
            if (isPlaying || !dragStart) return;
            const rect = editorCanvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left + camX;
            const mouseY = e.clientY - rect.top;
            const gridX = Math.floor(mouseX / GRID_SIZE) * GRID_SIZE;
            const gridY = Math.floor(mouseY / GRID_SIZE) * GRID_SIZE;

            if (currentTool === 'moving') {
                levelData.platforms.push({ 
                    x: dragStart.x, y: dragStart.y, w: GRID_SIZE, h: GRID_SIZE, 
                    type: 'moving', 
                    path: [{x: dragStart.x, y: dragStart.y}, {x: gridX, y: gridY}],
                    pathIndex: 0, pathDir: 1, currentPathX: dragStart.x, currentPathY: dragStart.y
                });
                dragStart = null;
            }
        });

        let selectedObject = null;
        editorCanvas.addEventListener('mousemove', e => {
            if (isPlaying) return;
            const rect = editorCanvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left + camX;
            const mouseY = e.clientY - rect.top;

            if (!dragStart) { // Only highlight if not currently dragging for a moving platform
                selectedObject = getObjectAtMouse(mouseX, mouseY);
            }
        });

        function getObjectAtMouse(mouseX, mouseY) {
            let found = null;
            // Check hazards
            levelData.hazards.forEach(h => {
                let objW = h.type === 'saw' ? SAW_SIZE : GRID_SIZE;
                let objH = h.type === 'saw' ? SAW_SIZE : GRID_SIZE;
                let objX = h.type === 'saw' ? h.x - h.r : h.x;
                let objY = h.type === 'saw' ? h.y - h.r : h.y;
                if (mouseX > objX && mouseX < objX + objW &&
                    mouseY > objY && mouseY < objY + objH) {
                    found = h;
                }
            });
            // Check platforms
            levelData.platforms.forEach(p => {
                if (mouseX > p.x && mouseX < p.x + p.w &&
                    mouseY > p.y && mouseY < p.y + p.h) {
                    found = p;
                }
            });
            // Check goal
            levelData.goals.forEach(g => {
                if (mouseX > g.x && mouseX < g.x + g.w &&
                    mouseY > g.y && mouseY < g.y + g.h) {
                    found = g;
                }
            });
            // Check start
            if (mouseX > levelData.start.x && mouseX < levelData.start.x + GRID_SIZE &&
                mouseY > levelData.start.y && mouseY < levelData.start.y + GRID_SIZE) {
                found = levelData.start;
            }
            return found;
        }

        function deleteSelectedObject() {
            if (selectedObject) {
                if (selectedObject === levelData.start) {
                    alert("cannot delete the start point.");
                    return;
                }
                levelData.platforms = levelData.platforms.filter(obj => obj !== selectedObject);
                levelData.hazards = levelData.hazards.filter(obj => obj !== selectedObject);
                levelData.goals = levelData.goals.filter(obj => obj !== selectedObject);
                selectedObject = null;
            }
        }


        // --- Game/Editor Loop ---
        function resetPlayer() {
            player.x = levelData.start.x; 
            player.y = levelData.start.y - player.h;
            player.vx = 0; player.vy = 0; 
            player.jumps = 2;
            player.grounded = false;
        }

        function updateGameLogic() {
            if (player.moveLeft) player.vx -= player.speed;
            if (player.moveRight) player.vx += player.speed;

            player.vx *= 0.88; player.vy += 0.6;
            player.x += player.vx; player.y += player.vy;
            player.rot += player.vx * 0.06;
            camX = player.x - editorCanvas.width / 4;

            player.grounded = false;
            levelData.platforms.forEach(plat => {
                if (plat.type === 'moving') {
                    // Update moving platform position
                    const currentPos = plat.path[plat.pathIndex];
                    const targetPos = plat.path[(plat.pathIndex + plat.pathDir + plat.path.length) % plat.path.length];
                    
                    const moveSpeed = 2; // Fixed speed for moving platforms
                    const dist = Math.hypot(targetPos.x - currentPos.x, targetPos.y - currentPos.y);

                    if (dist < moveSpeed) { // Reached target, switch direction/target
                        plat.pathIndex = (plat.pathIndex + plat.pathDir + plat.path.length) % plat.path.length;
                        if (plat.pathIndex === 0 && plat.pathDir === -1) plat.pathDir = 1; // loop
                        if (plat.pathIndex === plat.path.length - 1 && plat.pathDir === 1) plat.pathDir = -1; // loop
                        plat.currentPathX = targetPos.x;
                        plat.currentPathY = targetPos.y;
                    } else {
                        const angle = Math.atan2(targetPos.y - currentPos.y, targetPos.x - currentPos.x);
                        plat.currentPathX += Math.cos(angle) * moveSpeed;
                        plat.currentPathY += Math.sin(angle) * moveSpeed;
                    }
                    plat.x = plat.currentPathX;
                    plat.y = plat.currentPathY;
                }

                // Player collision with platforms
                if (player.x + player.w > plat.x && player.x < plat.x + plat.w &&
                    player.y + player.h > plat.y && player.y + player.h < plat.y + plat.h && player.vy >= 0) {
                    player.y = plat.y - player.h; player.vy = 0; player.grounded = true; player.jumps = 2;
                }
            });

            levelData.hazards.forEach(h => {
                if (h.type === 'saw') {
                    h.rot += 0.2;
                    if (Math.hypot(player.x + player.w/2 - h.x, player.y + player.h/2 - h.y) < h.r + player.w/2) { resetPlayer(); }
                } else { // spike
                    for (let i = 0; i < h.w; i += GRID_SIZE) {
                        let isRogue = (i === h.rogue * GRID_SIZE); // Rogue spike is always the first one for now
                        let spikeTipY = h.y - (isRogue ? 20 : 10); // Rogue is taller
                        if (player.x + player.w > h.x + i && player.x < h.x + i + GRID_SIZE && 
                            player.y + player.h > spikeTipY && player.y < h.y + GRID_SIZE) { 
                            resetPlayer(); 
                        }
                    }
                }
            });

            levelData.goals.forEach(g => {
                if (player.x + player.w > g.x && player.x < g.x + g.w &&
                    player.y + player.h > g.y && player.y < g.y + g.h) {
                    alert("level complete! congrats!");
                    togglePlay(); // Go back to editor
                }
            });

            if (player.y > editorCanvas.height + 200) { resetPlayer(); }
        }

        function drawGameAndEditor() {
            editorCanvas.width = window.innerWidth;
            editorCanvas.height = window.innerHeight;
            editorCtx.clearRect(0, 0, editorCanvas.width, editorCanvas.height);
            editorCtx.save();
            editorCtx.translate(-camX, 0);

            // Draw grid in editor mode
            if (!isPlaying) {
                editorCtx.strokeStyle = 'rgba(255,255,255,0.1)';
                for (let x = -camX % GRID_SIZE; x < editorCanvas.width; x += GRID_SIZE) {
                    editorCtx.beginPath(); editorCtx.moveTo(x, 0); editorCtx.lineTo(x, editorCanvas.height); editorCtx.stroke();
                }
                for (let y = 0; y < editorCanvas.height; y += GRID_SIZE) {
                    editorCtx.beginPath(); editorCtx.moveTo(0, y); editorCtx.lineTo(editorCanvas.width, y); editorCtx.stroke();
                }
            }

            // Draw platforms
            levelData.platforms.forEach(plat => {
                editorCtx.fillStyle = plat.type === 'moving' ? '#fb923c' : '#ea580c';
                editorCtx.fillRect(plat.x, plat.y, plat.w, plat.h);

                // Draw moving platform path in editor mode
                if (!isPlaying && plat.type === 'moving' && plat.path && plat.path.length > 1) {
                    editorCtx.strokeStyle = 'rgba(255,255,255,0.5)';
                    editorCtx.lineWidth = 1;
                    editorCtx.setLineDash([5, 5]);
                    editorCtx.beginPath();
                    editorCtx.moveTo(plat.path[0].x + plat.w/2, plat.path[0].y + plat.h/2);
                    for(let i=1; i<plat.path.length; i++) {
                        editorCtx.lineTo(plat.path[i].x + plat.w/2, plat.path[i].y + plat.h/2);
                    }
                    editorCtx.stroke();
                    editorCtx.setLineDash([]);
                }
            });

            // Draw hazards
            levelData.hazards.forEach(h => {
                editorCtx.fillStyle = '#f97316';
                if (h.type === 'saw') {
                    editorCtx.save(); editorCtx.translate(h.x, h.y); editorCtx.rotate(h.rot);
                    editorCtx.beginPath(); editorCtx.arc(0, 0, h.r, 0, Math.PI*2); editorCtx.fill();
                    for(let i=0; i<8; i++) { editorCtx.rotate(Math.PI/4); editorCtx.fillRect(-4, -h.r - 15, 8, 20); } // Bigger blades for bigger saw
                    editorCtx.restore();
                } else { // spike
                    for(let i=0; i<h.w; i+=GRID_SIZE) {
                        let isRogue = (i === h.rogue * GRID_SIZE);
                        editorCtx.beginPath(); editorCtx.moveTo(h.x+i, h.y + GRID_SIZE); 
                        editorCtx.lineTo(h.x+i+GRID_SIZE/2, h.y-(isRogue ? 20 : 10)); 
                        editorCtx.lineTo(h.x+i+GRID_SIZE, h.y+GRID_SIZE); editorCtx.fill();
                    }
                }
            });

            // Draw start block
            editorCtx.fillStyle = '#16a34a'; // Green for start
            editorCtx.fillRect(levelData.start.x, levelData.start.y, GRID_SIZE, GRID_SIZE);

            // Draw goal blocks
            levelData.goals.forEach(g => {
                editorCtx.fillStyle = '#fbbf24';
                editorCtx.fillRect(g.x, g.y, GRID_SIZE, GRID_SIZE);
            });

            // Draw player in play mode
            if (isPlaying) {
                editorCtx.save();
                editorCtx.translate(player.x + player.w/2, player.y + player.h/2); editorCtx.rotate(player.rot);
                editorCtx.fillStyle = '#f97316'; editorCtx.beginPath(); editorCtx.arc(0, 0, player.w/2, 0, Math.PI*2); editorCtx.fill();
                editorCtx.fillStyle = '#431407'; editorCtx.beginPath(); editorCtx.arc(-6, -4, 2, 0, Math.PI*2); editorCtx.fill();
                editorCtx.beginPath(); editorCtx.arc(6, -4, 2, 0, Math.PI*2); editorCtx.fill();
                editorCtx.strokeStyle = '#431407'; editorCtx.lineWidth = 2;
                editorCtx.beginPath(); editorCtx.arc(0, 2, 8, 0.1 * Math.PI, 0.9 * Math.PI); editorCtx.stroke();
                editorCtx.restore();
            }

            // Highlight selected object in editor mode
            if (!isPlaying && selectedObject) {
                editorCtx.strokeStyle = '#fde047';
                editorCtx.lineWidth = 3;
                if (selectedObject.type === 'saw') {
                    editorCtx.strokeRect(selectedObject.x - selectedObject.r, selectedObject.y - selectedObject.r, SAW_SIZE, SAW_SIZE);
                } else if (selectedObject === levelData.start) {
                    editorCtx.strokeRect(selectedObject.x, selectedObject.y, GRID_SIZE, GRID_SIZE);
                } else if (selectedObject.w && selectedObject.h) { // generic platform/goal
                    editorCtx.strokeRect(selectedObject.x, selectedObject.y, selectedObject.w, selectedObject.h);
                } else if (selectedObject.type === 'spike') {
                     editorCtx.strokeRect(selectedObject.x, selectedObject.y, selectedObject.w, GRID_SIZE);
                }
            }

            // Draw current moving platform drag path
            if (!isPlaying && dragStart && currentTool === 'moving') {
                const rect = editorCanvas.getBoundingClientRect();
                const mouseX = keys['MouseLeft'] ? e.clientX - rect.left + camX : editorCanvas.mouseX + camX; // Get current mouse pos
                const mouseY = keys['MouseLeft'] ? e.clientY - rect.top : editorCanvas.mouseY;

                editorCtx.strokeStyle = 'rgba(253, 224, 71, 0.8)';
                editorCtx.lineWidth = 2;
                editorCtx.setLineDash([8, 8]);
                editorCtx.beginPath();
                editorCtx.moveTo(dragStart.x + GRID_SIZE/2, dragStart.y + GRID_SIZE/2);
                editorCtx.lineTo(Math.floor(mouseX / GRID_SIZE) * GRID_SIZE + GRID_SIZE/2, Math.floor(mouseY / GRID_SIZE) * GRID_SIZE + GRID_SIZE/2);
                editorCtx.stroke();
                editorCtx.setLineDash([]);
            }

            editorCtx.restore();
        }

        function loop() {
            if (isPlaying) updateGameLogic();
            drawGameAndEditor();
            requestAnimationFrame(loop);
        }

        // --- Initialization ---
        showHomeScreen(); // Start on the home screen
        loop();
    </script>
</body>
</html>
